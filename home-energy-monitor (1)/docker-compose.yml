version: "3.9"

services:
  broker:
    image: eclipse-mosquitto:2
    container_name: hem-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  web:
    build: .
    container_name: hem-web
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./:/app
    ports:
      - "5000:5000"
    depends_on:
      - broker

volumes:
  mosquitto_data:
  mosquitto_log: